name: Keep Alive

on:
  schedule:
    - cron: '0 2 * * 0'  # 每周 UTC 2:00 (北京时间周一 10:00) 运行一次

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Keep repository active
        run: |
          echo "Keeping repository active at $(date)"
          
      - name: Touch a file to update repo activity
        run: |
          echo "Last keep-alive: $(date)" > .keep-alive
          
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keep-alive || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: keep-alive [skip ci]"
          git push