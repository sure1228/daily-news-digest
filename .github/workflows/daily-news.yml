name: Daily News Audio Digest

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 0:00 = 北京时间 8:00
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news digest
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python main.py

      - name: Get current date
        id: date
        run: |
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Audio
        uses: softprops/action-gh-release@v2
        if: always() && !cancelled()
        with:
          name: "Daily Digest - ${{ steps.date.outputs.date }}"
          tag_name: "${{ steps.date.outputs.date }}"
          body: "每日新闻摘要音频 - ${{ steps.date.outputs.date }}"
          files: |
            output/*.mp3
            output/*.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: Upload audio artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-audio-${{ github.run_number }}
          path: output/
          retention-days: 7

      - name: Commit summary text
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/*.txt || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: add daily news summary text"
          git push || true